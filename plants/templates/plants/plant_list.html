<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог растений</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Каталог комнатных растений</h1>
        <div class="row">
            {% for plant in plants %}
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title"><a href="{% url 'plant_detail' plant.id %}">{{ plant.name }}</a></h5>
                            <p class="card-text">{{ plant.description|default:"Описание отсутствует" }}</p>
                            <p><strong>Фаза:</strong> {{ plant.get_growth_phase_display }}</p>
                            <p><strong>Подкормка:</strong> раз в {{ plant.feeding_interval_days }} дней</p>
                        </div>
                    </div>
                </div>
            {% empty %}
                <p>Растений пока нет.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
